<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>REZ AI — Active Meeting Capture</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background-color: #F8F7F4;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .card {
      background: white;
      border: 1px solid #E5E5E1;
      border-radius: 24px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      text-align: center;
    }
    .logo {
      background-color: #1A1A1A;
      color: #FFFFFF;
      font-family: Georgia, serif;
      font-weight: bold;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 20px auto;
    }
    h2 {
      font-family: Georgia, serif;
      font-size: 24px;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    p {
      color: #71716A;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 99px;
      background: #F3F4F6;
      margin-bottom: 24px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #71716A;
    }
    .dot.active {
      background-color: #10B981;
      box-shadow: 0 0 8px #10B981;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    button {
      background-color: #1A1A1A;
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #000000;
    }
    button:disabled {
      background-color: #E5E5E1;
      color: #71716A;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h2 id="title">REZ AI Companion</h2>
    <p id="desc">Ready to establish a connection to your meeting stream.</p>
    
    <div class="status-badge">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Initializing...</span>
    </div>
    
    <button id="actionBtn">Start Sharing Tab & Recording</button>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
